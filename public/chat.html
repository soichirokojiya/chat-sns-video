<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <title>うめこ - Chat Video</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Status bar (iOS-like) -->
  <div class="status-bar">
    <div class="status-bar-left">
      <span>18:42</span>
    </div>
    <div class="status-bar-right">
      <span>📶</span>
      <span>🔋</span>
    </div>
  </div>

  <!-- Chat header -->
  <div class="chat-header">
    <span class="back-arrow">‹</span>
    <div class="header-center">
      <span class="group-name" id="groupName">家族グループ</span>
      <span class="member-count" id="memberCount">メンバー 3</span>
    </div>
    <div class="header-icons">
      <span>📞</span>
      <span>☰</span>
    </div>
  </div>

  <!-- Date separator -->
  <div class="chat-area" id="chatArea">
    <div class="date-separator" id="dateSep">今日</div>
  </div>

  <!-- Input bar -->
  <div class="input-bar" id="inputBar">
    <span class="input-icon">＋</span>
    <div class="input-field" id="inputField">
      <span class="typing-text" id="typingText"></span>
      <span class="typing-cursor" id="typingCursor" style="display:none"></span>
    </div>
    <span class="input-icon">🎤</span>
    <div class="send-btn" id="sendBtn">▶</div>
  </div>

  <!-- Effect overlays -->
  <div class="effect-focus-overlay" id="focusOverlay"></div>
  <div class="effect-flash-overlay" id="flashOverlay"></div>

  <!-- Overlays -->
  <div class="overlay" id="overlay">
    <div class="overlay-bg"></div>
    <div class="overlay-text" id="overlayText"></div>
  </div>
  <div class="caption-bar" id="captionBar">
    <div class="caption-text" id="captionText"></div>
  </div>
  <div class="ending-screen" id="endingScreen">
    <div class="ending-tagline" id="endingTagline"></div>
    <div class="ending-brand">
      <img class="brand-icon" src="umeko-icon.png" alt="うめこ">
      <span id="endingBrand">うめこ</span>
    </div>
    <div class="ending-cta" id="endingCta"></div>
    <div class="ending-link" id="endingLink"></div>
  </div>

  <script>
    const chatArea = document.getElementById('chatArea');
    const overlay = document.getElementById('overlay');
    const overlayText = document.getElementById('overlayText');
    const captionBar = document.getElementById('captionBar');
    const captionText = document.getElementById('captionText');
    const endingScreen = document.getElementById('endingScreen');
    const typingText = document.getElementById('typingText');
    const typingCursor = document.getElementById('typingCursor');
    const sendBtn = document.getElementById('sendBtn');
    const focusOverlay = document.getElementById('focusOverlay');
    const flashOverlay = document.getElementById('flashOverlay');

    let members = {};
    let typingTimer = null;

    function hideAll() {
      overlay.classList.remove('visible');
      captionBar.classList.remove('visible');
      endingScreen.classList.remove('visible');
    }

    function clearEffects() {
      // Focus
      focusOverlay.classList.remove('active');
      document.querySelectorAll('.effect-focus-target').forEach(el => el.classList.remove('effect-focus-target'));
      // Zoom
      chatArea.classList.remove('effect-zoom');
      document.body.classList.remove('effect-zoom');
      // Shake
      document.body.classList.remove('effect-shake');
      // Flash
      flashOverlay.classList.remove('active');
      // Glow
      document.querySelectorAll('.effect-glow').forEach(el => el.classList.remove('effect-glow'));
    }

    function applyEffect(effect, targetRow) {
      clearEffects();
      if (!effect || effect === 'none') return;

      switch (effect) {
        case 'focus':
          focusOverlay.classList.add('active');
          if (targetRow) targetRow.classList.add('effect-focus-target');
          break;
        case 'zoom':
          document.body.classList.add('effect-zoom');
          break;
        case 'shake':
          document.body.classList.add('effect-shake');
          // Remove after animation so it can be re-triggered
          setTimeout(() => document.body.classList.remove('effect-shake'), 600);
          break;
        case 'flash':
          flashOverlay.classList.add('active');
          setTimeout(() => flashOverlay.classList.remove('active'), 900);
          break;
        case 'glow':
          if (targetRow) targetRow.classList.add('effect-glow');
          break;
      }
    }

    function clearTyping() {
      if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
      typingText.textContent = '';
      typingCursor.style.display = 'none';
      sendBtn.classList.remove('active');
    }

    // Simulate typing in the input bar before a "right" side message
    function simulateTyping(text, callback) {
      clearTyping();
      // Only show first line, truncated
      const displayText = text.split('\n')[0].slice(0, 30);
      let idx = 0;
      typingCursor.style.display = 'inline-block';

      typingTimer = setInterval(() => {
        if (idx < displayText.length) {
          typingText.textContent = displayText.slice(0, idx + 1);
          idx++;
          if (idx > 3) sendBtn.classList.add('active');
        } else {
          clearInterval(typingTimer);
          typingTimer = null;
          // Brief pause then "send"
          setTimeout(() => {
            clearTyping();
            if (callback) callback();
          }, 200);
        }
      }, 60);
    }

    function showHook(text) {
      hideAll();
      overlayText.textContent = text;
      overlay.classList.add('visible');
    }

    function showMessage(scene, skipTyping) {
      hideAll();
      const member = members[scene.speaker];
      if (!member) return;

      const doShow = () => {
        const row = document.createElement('div');
        row.className = `message-row ${member.side}`;
        if (scene.speaker === 'umeko') row.classList.add('umeko');
        const avatarHtml = member.avatarImage
          ? `<img class="avatar" src="${member.avatarImage}" alt="${member.name}">`
          : `<div class="avatar" style="background:${member.avatarColor}">${member.avatarEmoji}</div>`;

        const readHtml = member.side === 'right' ? '<span class="read-receipt">既読</span>' : '';

        row.innerHTML = `
          ${avatarHtml}
          <div class="bubble-wrapper">
            <div class="speaker-name">${member.name}</div>
            <div class="bubble">${scene.text}</div>
            <div class="bubble-meta">${readHtml}<span class="time">${scene.time || ''}</span></div>
          </div>
        `;
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          row.classList.add('visible');
          // Apply effect after message is visible
          if (scene.effect) applyEffect(scene.effect, row);
        }));
      };

      if (member.side === 'right' && !skipTyping) {
        simulateTyping(scene.text, doShow);
      } else {
        doShow();
      }
    }

    function showCaption(text, style) {
      hideAll();
      captionText.textContent = text;
      captionText.className = 'caption-text' + (style === 'highlight' ? ' highlight' : '');
      captionBar.classList.add('visible');
    }

    function showEnding(lines) {
      hideAll();
      document.getElementById('endingTagline').textContent = lines[0] || '';
      document.getElementById('endingBrand').textContent = lines[1] || 'うめこ';
      document.getElementById('endingCta').textContent = lines[2] || '';
      document.getElementById('endingLink').textContent = lines[3] || '';
      endingScreen.classList.add('visible');
    }

    window.showScene = function(scene, skipTyping) {
      // Clear previous effects (unless this scene has its own)
      if (!scene.effect) clearEffects();

      switch (scene.type) {
        case 'hook':
          showHook(scene.text);
          if (scene.effect) applyEffect(scene.effect);
          break;
        case 'message':
          showMessage(scene, skipTyping);
          // effect is applied inside showMessage after row is visible
          break;
        case 'caption':
          showCaption(scene.text, scene.style);
          if (scene.effect) applyEffect(scene.effect);
          break;
        case 'ending':
          showEnding(scene.lines);
          clearEffects();
          break;
      }
    };

    window.initScenario = function(data) {
      members = data.members;
      document.getElementById('groupName').textContent = data.groupName;
      document.getElementById('memberCount').textContent = `メンバー ${Object.keys(members).length}`;
    };

    window.resetChat = function() {
      clearTyping();
      clearEffects();
      chatArea.innerHTML = '<div class="date-separator">今日</div>';
      hideAll();
    };

    window.clearOverlays = function() { hideAll(); };

    // Wait for CSS transitions
    function waitForTransition(el) {
      return new Promise(resolve => {
        if (!el) return resolve();
        const handler = () => { el.removeEventListener('transitionend', handler); resolve(); };
        el.addEventListener('transitionend', handler);
        setTimeout(resolve, 800);
      });
    }

    async function showSceneAndNotify(scene) {
      let transitionTarget = null;

      if (scene.type === 'message') {
        // For recording, skip typing animation (capture static result)
        showMessage(scene, true);
        transitionTarget = chatArea.lastElementChild;
      } else {
        window.showScene(scene, true);
        if (scene.type === 'hook') transitionTarget = overlay;
        else if (scene.type === 'caption') transitionTarget = captionBar;
        else if (scene.type === 'ending') transitionTarget = endingScreen;
      }

      await waitForTransition(transitionTarget);
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'sceneReady' }, '*');
      }
    }

    async function clearOverlaysAndNotify() {
      const wasOverlay = overlay.classList.contains('visible');
      const wasCaption = captionBar.classList.contains('visible');
      const target = wasOverlay ? overlay : wasCaption ? captionBar : null;
      hideAll();
      if (target) await waitForTransition(target);
      if (window.parent !== window) {
        window.parent.postMessage({ action: 'clearReady' }, '*');
      }
    }

    // Listen for postMessage from parent
    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (!msg || !msg.action) return;
      switch (msg.action) {
        case 'init': window.initScenario(msg.data); break;
        case 'showScene': window.showScene(msg.data); break;
        case 'showSceneForRecord': showSceneAndNotify(msg.data); break;
        case 'clearOverlaysForRecord': clearOverlaysAndNotify(); break;
        case 'reset': window.resetChat(); break;
        case 'clearOverlays': window.clearOverlays(); break;
      }
    });

    // Standalone auto-play
    async function autoPlay() {
      try {
        const res = await fetch('./scenario.json');
        const data = await res.json();
        window.initScenario(data);
        for (const scene of data.scenes) {
          await new Promise(r => setTimeout(r, 300));
          window.showScene(scene);
          await new Promise(r => setTimeout(r, scene.durationMs));
          if (scene.type === 'hook' || scene.type === 'caption') hideAll();
        }
      } catch (e) {}
    }
    if (window === window.top) autoPlay();
  </script>
</body>
</html>
