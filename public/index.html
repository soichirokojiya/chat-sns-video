<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>うめこ動画エディタ</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #f5f5f0;
      --card: #fff;
      --border: #e0ddd5;
      --text: #333;
      --text-sub: #888;
      --accent: #06C755;
      --accent-light: #E8F5E9;
      --danger: #e55;
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .editor {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 0;
    }
    .editor h1 { font-size: 22px; display: flex; align-items: center; gap: 10px; }
    .editor h1 span { font-size: 28px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
    .toolbar button, .toolbar select {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toolbar button:hover { background: var(--accent-light); border-color: var(--accent); }
    .toolbar .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .toolbar .btn-primary:hover { opacity: 0.85; }
    .toolbar .btn-record { background: #d64545; color: #fff; border-color: #d64545; }
    .toolbar .btn-record:hover { opacity: 0.85; }
    .toolbar .btn-record:disabled { opacity: 0.5; cursor: default; }
    .meta-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .meta-section h2 { font-size: 15px; color: var(--text-sub); }
    .meta-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .meta-row label { font-size: 13px; color: var(--text-sub); min-width: 80px; }
    .meta-row input, .meta-row select {
      flex: 1; min-width: 100px; padding: 6px 10px;
      border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
    }
    .member-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .member-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; background: var(--accent-light);
      border: 1px solid var(--border); border-radius: 20px;
      font-size: 13px; cursor: pointer;
    }
    .member-chip:hover { border-color: var(--accent); }
    .member-chip .dot { width: 12px; height: 12px; border-radius: 50%; }
    .scene-list { display: flex; flex-direction: column; gap: 8px; }
    .scene-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; gap: 12px; align-items: flex-start;
      transition: box-shadow 0.15s; cursor: grab;
    }
    .scene-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .scene-card.dragging { opacity: 0.5; }
    .scene-card.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
    .scene-num {
      font-size: 12px; color: var(--text-sub); background: var(--bg);
      border-radius: 4px; padding: 2px 8px; white-space: nowrap; flex-shrink: 0; margin-top: 2px;
    }
    .scene-body { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .scene-type-row { display: flex; gap: 8px; align-items: center; }
    .scene-type-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
    .scene-type-badge.hook { background: #E3F2FD; color: #1565C0; }
    .scene-type-badge.message { background: #E8F5E9; color: #2E7D32; }
    .scene-type-badge.caption { background: #FFF3E0; color: #E65100; }
    .scene-type-badge.ending { background: #FCE4EC; color: #AD1457; }
    .scene-speaker { font-size: 12px; color: var(--accent); font-weight: 600; }
    .scene-duration { font-size: 12px; color: var(--text-sub); margin-left: auto; }
    .scene-text-input {
      width: 100%; border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 10px; font-size: 14px; font-family: inherit;
      resize: vertical; min-height: 36px; line-height: 1.5;
    }
    .scene-text-input:focus { outline: none; border-color: var(--accent); }
    .scene-fields { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .scene-fields select, .scene-fields input {
      padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
    }
    .scene-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
    .scene-actions button {
      width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--card); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .scene-actions button:hover { background: #fee; border-color: var(--danger); }
    .scene-actions .move-btn:hover { background: var(--accent-light); border-color: var(--accent); }
    .add-scene-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .add-scene-bar button {
      padding: 8px 16px; border: 2px dashed var(--border); border-radius: var(--radius);
      background: transparent; font-size: 13px; cursor: pointer; color: var(--text-sub); transition: all 0.15s;
    }
    .add-scene-bar button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    /* SNS tabs */
    .sns-tab {
      padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--card); font-size: 13px; cursor: pointer; transition: all 0.15s;
    }
    .sns-tab:hover { background: var(--accent-light); border-color: var(--accent); }
    .sns-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Preset selector */
    .preset-section {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
    }
    .preset-section h2 { font-size: 15px; color: var(--text-sub); margin-bottom: 10px; }
    .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .preset-btn {
      padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--card); font-size: 13px; cursor: pointer; text-align: left;
      transition: all 0.15s; line-height: 1.4;
    }
    .preset-btn:hover { background: var(--accent-light); border-color: var(--accent); }
    .preset-btn .preset-icon { margin-right: 6px; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3); z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border-radius: 16px; padding: 24px;
      min-width: 380px; max-width: 90vw; box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .modal h3 { margin-bottom: 16px; font-size: 18px; }
    .modal .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .modal .field label { font-size: 13px; color: var(--text-sub); }
    .modal .field input, .modal .field select {
      padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
    }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .modal-actions button {
      padding: 8px 20px; border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--card); font-size: 14px; cursor: pointer;
    }
    .modal-actions .btn-save { background: var(--accent); color: #fff; border-color: var(--accent); }
    .modal-actions .btn-delete { background: var(--danger); color: #fff; border-color: var(--danger); margin-right: auto; }

    /* Preview */
    .preview-panel {
      width: 380px; flex-shrink: 0; background: #2a2a2a;
      display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px;
    }
    .preview-label { color: #aaa; font-size: 13px; font-weight: 600; }
    .preview-phone {
      width: 270px; height: 480px; border-radius: 24px; overflow: hidden;
      border: 3px solid #444; background: #000; position: relative;
    }
    .preview-phone iframe {
      width: 1080px; height: 1920px; border: none; transform: scale(0.25); transform-origin: top left;
    }
    .preview-controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .preview-controls button {
      padding: 8px 20px; border: none; border-radius: var(--radius);
      background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .preview-controls button:hover { opacity: 0.85; }
    .preview-controls button:disabled { opacity: 0.4; cursor: default; }
    .preview-progress { color: #aaa; font-size: 12px; text-align: center; }
    .total-duration { color: #ccc; font-size: 13px; font-weight: 600; }

    /* Saved */
    .saved-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .saved-section h2 { font-size: 15px; color: var(--text-sub); margin-bottom: 10px; }
    .saved-list { display: flex; flex-direction: column; gap: 6px; }
    .saved-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; background: var(--bg); border-radius: 6px;
      font-size: 14px; cursor: pointer; transition: background 0.15s;
    }
    .saved-item:hover { background: var(--accent-light); }
    .saved-item-actions { display: flex; gap: 4px; }
    .saved-item-actions button {
      padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px;
      background: var(--card); font-size: 12px; cursor: pointer;
    }

    /* Recording overlay */
    .record-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 2000;
      align-items: center; justify-content: center; flex-direction: column; gap: 20px;
    }
    .record-overlay.active { display: flex; }
    .record-overlay .rec-status {
      color: #fff; font-size: 24px; font-weight: 700;
    }
    .record-overlay .rec-dot {
      display: inline-block; width: 16px; height: 16px;
      background: #f44; border-radius: 50%; margin-right: 10px;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .record-overlay .rec-progress { color: #ccc; font-size: 16px; }
  </style>
</head>
<body>
  <div class="editor" id="editorPanel">
    <h1><span>🌸</span> うめこ動画エディタ</h1>

    <div class="toolbar">
      <button class="btn-primary" onclick="playPreview()">再生</button>
      <button class="btn-record" onclick="recordAndDownload()" id="recordBtn">録画してダウンロード</button>
      <button onclick="resetPreview()">リセット</button>
      <button onclick="saveScenario()">保存</button>
      <button onclick="exportJSON()">JSON出力</button>
      <button onclick="importJSON()">JSON読込</button>
    </div>

    <!-- Presets -->
    <div class="preset-section">
      <h2>シナリオテンプレート</h2>
      <div class="preset-grid" id="presetGrid"></div>
    </div>

    <!-- Meta -->
    <div class="meta-section">
      <h2>基本情報</h2>
      <div class="meta-row">
        <label>タイトル</label>
        <input type="text" id="metaTitle" oninput="updateMeta()">
      </div>
      <div class="meta-row">
        <label>グループ名</label>
        <input type="text" id="metaGroup" oninput="updateMeta()">
      </div>
    </div>

    <!-- Members -->
    <div class="meta-section">
      <h2>メンバー</h2>
      <div class="member-list" id="memberList"></div>
      <button onclick="openMemberModal()" style="margin-top:8px;padding:6px 14px;border:2px dashed var(--border);border-radius:8px;background:transparent;cursor:pointer;font-size:13px;color:var(--text-sub)">+ メンバー追加</button>
    </div>

    <!-- Scenes -->
    <div class="meta-section">
      <h2>シーン一覧 (<span id="sceneCount">0</span>シーン・合計 <span id="totalDuration">0</span>秒)</h2>
      <div class="scene-list" id="sceneList"></div>
      <div class="add-scene-bar" style="margin-top:12px">
        <button onclick="addScene('hook')">+ フック</button>
        <button onclick="addScene('message')">+ メッセージ</button>
        <button onclick="addScene('caption')">+ テロップ</button>
        <button onclick="addScene('ending')">+ エンディング</button>
        <button onclick="addScene('switchContext')">+ 画面切替</button>
      </div>
    </div>

    <!-- SNS Text -->
    <div class="meta-section">
      <h2>SNS投稿テキスト</h2>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
        <button onclick="generateSnsText('reels')" class="sns-tab" id="tab-reels">Instagram Reels</button>
        <button onclick="generateSnsText('tiktok')" class="sns-tab" id="tab-tiktok">TikTok</button>
        <button onclick="generateSnsText('shorts')" class="sns-tab" id="tab-shorts">YouTube Shorts</button>
        <button onclick="generateSnsText('x')" class="sns-tab" id="tab-x">X (Twitter)</button>
      </div>
      <div id="snsOutput" style="position:relative;">
        <textarea id="snsTextArea" rows="12" readonly style="width:100%;border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;font-family:inherit;line-height:1.7;resize:vertical;background:#fafaf8;"></textarea>
        <button onclick="copySnsText()" id="snsCopyBtn" style="position:absolute;top:8px;right:8px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-size:12px;cursor:pointer;transition:all 0.15s;">コピー</button>
      </div>
    </div>

    <!-- Saved -->
    <div class="saved-section">
      <h2>保存済みシナリオ</h2>
      <div class="saved-list" id="savedList"></div>
    </div>
  </div>

  <!-- Preview Panel -->
  <div class="preview-panel">
    <div class="preview-label">プレビュー</div>
    <div class="preview-phone">
      <iframe id="previewFrame" src="chat.html"></iframe>
    </div>
    <div class="preview-controls">
      <button onclick="playPreview()" id="playBtn">再生</button>
      <button onclick="resetPreview()">リセット</button>
    </div>
    <div class="preview-progress" id="previewProgress"></div>
    <div class="total-duration" id="previewDuration"></div>
  </div>

  <!-- Recording iframe (full size, off-screen) -->
  <iframe id="recordFrame" src="chat.html" style="position:fixed;left:-9999px;top:0;width:1080px;height:1920px;border:none;"></iframe>

  <!-- Recording overlay -->
  <div class="record-overlay" id="recordOverlay">
    <div class="rec-status"><span class="rec-dot"></span>録画中…</div>
    <div class="rec-progress" id="recProgress"></div>
  </div>

  <!-- Member modal -->
  <div class="modal-overlay" id="memberModal">
    <div class="modal">
      <h3 id="memberModalTitle">メンバー編集</h3>
      <div class="field"><label>ID (英数字)</label><input type="text" id="memId" placeholder="例: takashi"></div>
      <div class="field"><label>表示名</label><input type="text" id="memName" placeholder="例: たかし"></div>
      <div class="field">
        <label>吹き出し位置</label>
        <select id="memSide"><option value="left">左 (相手)</option><option value="right">右 (自分)</option></select>
      </div>
      <div class="field"><label>アイコン絵文字</label><input type="text" id="memEmoji" placeholder="例: 👨"></div>
      <div class="field"><label>アイコン背景色</label><input type="color" id="memColor" value="#4A90D9"></div>
      <div class="field"><label>アイコン画像URL (任意)</label><input type="text" id="memImage" placeholder="例: umeko-icon.png"></div>
      <div class="modal-actions">
        <button class="btn-delete" id="memDeleteBtn" onclick="deleteMember()" style="display:none">削除</button>
        <button onclick="closeMemberModal()">キャンセル</button>
        <button class="btn-save" onclick="saveMember()">保存</button>
      </div>
    </div>
  </div>

  <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

  <script>
    // ==================== Umeko members (shared) ====================
    const UMEKO_MEMBERS = {
      husband: { name: "たかし", side: "left", avatarColor: "#4A90D9", avatarEmoji: "👨" },
      wife: { name: "あかね", side: "right", avatarColor: "#E87BA2", avatarEmoji: "👩" },
      umeko: { name: "うめこ", side: "left", avatarColor: "#F5C842", avatarEmoji: "🌸", avatarImage: "umeko-icon.png" }
    };
    const ENDING_DEFAULT = ["言いづらいことを、やわらかく。", "うめこ", "LINEグループに追加するだけ", "umeko.life"];

    // ==================== 10 Preset Scenarios ====================
    const PRESETS = [
      {
        label: "👫 夫婦で帰宅時間もめる(DM切替)",
        scenario: {
          title: "夫婦LINE - うめこDMフォロー篇",
          format: { width: 1080, height: 1920, fps: 30, durationSec: 35 },
          groupName: "家族グループ",
          members: { ...UMEKO_MEMBERS },
          preMessages: [
            { speaker: "wife", text: "今日の晩ごはん何にする？", time: "17:30" },
            { speaker: "husband", text: "なんでもいいよ", time: "17:35" },
            { speaker: "wife", text: "それが一番困るんだけど😅", time: "17:36" },
            { speaker: "husband", text: "じゃあカレーで！", time: "17:38" },
            { speaker: "wife", text: "了解〜", time: "17:40" },
            { speaker: "husband", text: "👍", time: "17:41" },
          ],
          scenes: [
            { type: "hook", text: "夫婦LINE、ちょっと\n険悪になったとき──", durationMs: 2500 },
            { type: "message", speaker: "husband", text: "今日も遅くなる、ごめん", time: "18:42", durationMs: 1500 },
            { type: "message", speaker: "wife", text: "……またなんだ", time: "18:43", durationMs: 1500 },
            { type: "message", speaker: "husband", text: "仕方ないだろ、仕事なんだから", time: "18:43", durationMs: 1500 },
            { type: "message", speaker: "wife", text: "わかってるけど、毎回それ言われると\n何も言えなくなる", time: "18:44", effect: "shake", durationMs: 2000 },
            { type: "caption", text: "空気が重くなってきた…", durationMs: 1500 },
            { type: "caption", text: "うめこが空気の変化を検知💡", style: "highlight", effect: "flash", durationMs: 1500 },
            { type: "caption", text: "グループではなく、それぞれにDMで──", style: "highlight", durationMs: 1500 },
            { type: "switchContext", to: "dm", dmWith: "wife", durationMs: 800 },
            { type: "message", speaker: "umeko", effect: "glow", text: "あかねさん、さっきのやりとり\n気になったので 😌\nたかしさんも申し訳なく思ってると\n思いますよ。\n「今週どこかで早く帰れる日ある？」\nって聞いてみるのはどうですか？", time: "18:45", durationMs: 3500 },
            { type: "message", speaker: "wife", text: "…たしかに、そう聞けばよかった", time: "18:46", durationMs: 1500 },
            { type: "switchContext", to: "dm", dmWith: "husband", durationMs: 800 },
            { type: "message", speaker: "umeko", effect: "glow", text: "たかしさん、お仕事おつかれさまです。\nあかねさんは寂しいんだと思います。\n「遅くなってごめん、◯曜は早く帰るね」\nって伝えると安心するかもです 😊", time: "18:45", durationMs: 3500 },
            { type: "message", speaker: "husband", text: "そっか…ちょっと言い方きつかったな", time: "18:46", durationMs: 1500 },
            { type: "caption", text: "それぞれが自分の言葉でグループに戻る", style: "highlight", durationMs: 1500 },
            { type: "switchContext", to: "group", durationMs: 800 },
            { type: "message", speaker: "husband", text: "さっきはごめん。\n水曜は早く帰るから、ごはん一緒に食べよう", time: "18:50", durationMs: 2500 },
            { type: "message", speaker: "wife", text: "うん、楽しみにしてる ☺️", time: "18:51", effect: "glow", durationMs: 2000 },
            { type: "ending", lines: ["どちらが悪いかより、\nどうしたらうまくいくか。", "うめこ", "LINEグループに追加するだけ", "umeko.life"], durationMs: 4000 }
          ]
        }
      },
      {
        label: "🧹 夫婦で家事分担もめる",
        scenario: {
          title: "夫婦LINE - 家事分担篇",
          format: { width: 1080, height: 1920, fps: 30, durationSec: 24 },
          groupName: "家族グループ",
          members: { ...UMEKO_MEMBERS },
          preMessages: [
            { speaker: "wife", text: "牛乳買ってきて〜", time: "15:00" },
            { speaker: "husband", text: "了解！", time: "15:05" },
            { speaker: "wife", text: "あとパンも🍞", time: "15:06" },
            { speaker: "husband", text: "OK", time: "15:10" },
            { speaker: "husband", text: "買ったよ", time: "16:30" },
            { speaker: "wife", text: "ありがとう😊", time: "16:35" },
            { speaker: "husband", text: "今日は早く帰れそう", time: "18:00" },
            { speaker: "wife", text: "了解！洗濯物取り込んでおいてね", time: "18:05" },
            { speaker: "husband", text: "👍", time: "18:06" },
          ],
          scenes: [
            { type: "hook", text: "「なんで私ばっかり」\nって思ったこと、ない？", durationMs: 3000 },

    async function playPreview() {

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ==================== Recording ====================
    // Architecture: completely decouple capture time from video time.
    // 1. For each scene state, send showSceneForRecord → wait for sceneReady postMessage
    // 2. html2canvas captures one PNG of that state (takes however long it takes)
    // 3. Store {png, durationMs} pairs
    // 4. Feed all PNGs into ffmpeg.wasm with exact durations via concat demuxer
    // Result: output mp4 timing is exactly what scenario.json says, regardless of capture speed.

    function waitForChildMessage(actionName) {
      return new Promise(resolve => {
        const handler = (e) => {
          if (e.data?.action === actionName) {
            window.removeEventListener('message', handler);
            resolve();
          }
        };
        window.addEventListener('message', handler);
      });
    }

    async function captureFrameAsCanvas(iframeEl) {
      const frameDoc = iframeEl.contentDocument || iframeEl.contentWindow.document;
      return html2canvas(frameDoc.body, {
        width: 1080, height: 1920, scale: 1,
        useCORS: true, allowTaint: true,
        backgroundColor: '#8CAAB7',
      });
    }

    async function recordAndDownload() {
      if (isRecording) return;
      isRecording = true;
      const btn = document.getElementById('recordBtn');
      btn.disabled = true;
      btn.textContent = '録画準備中…';
      document.getElementById('recordOverlay').classList.add('active');

      try {
        // Check WebCodecs support
        if (typeof VideoEncoder === 'undefined') {
          throw new Error('このブラウザはWebCodecs APIに対応していません。Chrome/Edgeの最新版をお使いください。');
        }
        if (typeof Mp4Muxer === 'undefined') {
          throw new Error('mp4-muxerの読み込みに失敗しました。ページを再読み込みしてください。');
        }

        const W = 1080, H = 1920, FPS = 30;
        const recFrame = document.getElementById('recordFrame');

        // Reset and init
        sendToRecord('reset');
        sendToRecord('init', scenario);
        await sleep(500);

        // Phase 1: Capture each scene as canvas + duration
        const capturedScenes = []; // { canvas, durationMs }

        for (let i = 0; i < scenario.scenes.length; i++) {
          const scene = scenario.scenes[i];
          document.getElementById('recProgress').textContent =
            `キャプチャ中… ${i + 1} / ${scenario.scenes.length}`;

          // For right-side messages: capture typing state first
          if (scene.type === 'message') {
            const member = scenario.members[scene.speaker];
            if (member && member.side === 'right') {
              // Show typing in input bar
              recFrame.contentWindow.postMessage({ action: 'setTyping', data: scene.text }, '*');
              await sleep(50);
              const typingCanvas = await captureFrameAsCanvas(recFrame);
              capturedScenes.push({ canvas: typingCanvas, durationMs: 800 });
              // Clear typing before showing the message
              recFrame.contentWindow.postMessage({ action: 'clearTyping' }, '*');
              await sleep(50);
            }
          }

          const readyPromise = waitForChildMessage('sceneReady');
          recFrame.contentWindow.postMessage({ action: 'showSceneForRecord', data: scene }, '*');
          await readyPromise;

          const canvas = await captureFrameAsCanvas(recFrame);
          capturedScenes.push({ canvas, durationMs: scene.durationMs });

          if (scene.type === 'hook' || scene.type === 'caption') {
            const clearPromise = waitForChildMessage('clearReady');
            recFrame.contentWindow.postMessage({ action: 'clearOverlaysForRecord' }, '*');
            await clearPromise;

            const clearCanvas = await captureFrameAsCanvas(recFrame);
            capturedScenes.push({ canvas: clearCanvas, durationMs: 400 });
          }
        }

        if (capturedScenes.length === 0) throw new Error('キャプチャされたフレームがありません');

        // Phase 2: Encode MP4 using WebCodecs + mp4-muxer
        document.getElementById('recProgress').textContent = 'MP4をエンコード中…';

        const muxer = new Mp4Muxer.Muxer({
          target: new Mp4Muxer.ArrayBufferTarget(),
          video: {
            codec: 'avc',
            width: W,
            height: H,
          },
          fastStart: 'in-memory',
        });

        const encoder = new VideoEncoder({
          output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
          error: (e) => console.error('VideoEncoder error:', e),
        });

        encoder.configure({
          codec: 'avc1.640033',
          width: W,
          height: H,
          bitrate: 5_000_000,
          framerate: FPS,
        });

        // For each captured scene, encode frames for its duration
        let timestampUs = 0;
        const frameDurationUs = 1_000_000 / FPS;

        for (let i = 0; i < capturedScenes.length; i++) {
          const { canvas, durationMs } = capturedScenes[i];
          const frameCount = Math.max(1, Math.round((durationMs / 1000) * FPS));

          document.getElementById('recProgress').textContent =
            `エンコード中… ${i + 1} / ${capturedScenes.length}`;

          for (let f = 0; f < frameCount; f++) {
            const frame = new VideoFrame(canvas, {
              timestamp: timestampUs,
              duration: frameDurationUs,
            });
            const isKeyframe = (f === 0); // first frame of each scene
            encoder.encode(frame, { keyFrame: isKeyframe });
            frame.close();
            timestampUs += frameDurationUs;
          }

          // Yield to UI to keep progress responsive
          if (i % 3 === 0) await sleep(0);
        }

        await encoder.flush();
        encoder.close();
        muxer.finalize();

        const mp4Buffer = muxer.target.buffer;
        const mp4Blob = new Blob([mp4Buffer], { type: 'video/mp4' });

        const url = URL.createObjectURL(mp4Blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (scenario.title || 'umeko-video') + '.mp4';
        a.click();
        URL.revokeObjectURL(url);

        document.getElementById('recProgress').textContent = '完了！';
      } catch (e) {
        console.error('録画エラー:', e);
        const msg = (e instanceof Error) ? e.message : String(e);
        alert('mp4の生成に失敗しました:\n' + msg);
      }

      document.getElementById('recordOverlay').classList.remove('active');
      btn.disabled = false;
      btn.textContent = '録画してダウンロード';
      isRecording = false;
    }

    // ==================== SNS Text ====================
    function generateSnsText(platform) {
      // Highlight active tab
      document.querySelectorAll('.sns-tab').forEach(t => t.classList.remove('active'));
      const tab = document.getElementById('tab-' + platform);
      if (tab) tab.classList.add('active');

      // Extract content from scenario
      const hookScene = scenario.scenes.find(s => s.type === 'hook');
      const endingScene = scenario.scenes.find(s => s.type === 'ending');
      const messages = scenario.scenes.filter(s => s.type === 'message');
      const captions = scenario.scenes.filter(s => s.type === 'caption');

      const hookText = hookScene?.text?.replace(/\n/g, '') || '';
      const tagline = endingScene?.lines?.[0] || '';
      const brandName = endingScene?.lines?.[1] || 'うめこ';
      const cta = endingScene?.lines?.[2] || '';
      const link = endingScene?.lines?.[3] || '';

      // Build a short summary of the conversation conflict
      const firstCaption = captions[0]?.text || '';

      // Find umeko's message
      const umekoMsg = messages.find(m => m.speaker === 'umeko');
      const umekoFirstLine = umekoMsg?.text?.split('\n')[0] || '';

      // Determine the situation theme
      const title = scenario.title || '';

      const hashtags = [
        '#うめこ', '#LINE', '#会話',
        '#人間関係', '#コミュニケーション',
        '#夫婦', '#カップル', '#職場',
        '#言い方', '#空気を読む',
        '#あるある', '#共感',
      ];

      let text = '';

      if (platform === 'reels') {
        text = [
          hookText,
          '',
          `${firstCaption}`,
          '',
          `💬 ${tagline}`,
          '',
          `🌸 ${brandName}`,
          `${cta}`,
          link ? `👉 ${link}` : '',
          '',
          hashtags.slice(0, 10).join(' '),
        ].filter(Boolean).join('\n');
      } else if (platform === 'tiktok') {
        text = [
          `${hookText} ${firstCaption}`,
          '',
          `${tagline}`,
          `🌸${brandName}でLINEの空気が変わる`,
          link ? `👉 ${link}` : '',
          '',
          hashtags.join(' '),
        ].filter(Boolean).join('\n');
      } else if (platform === 'shorts') {
        text = [
          `【${title || hookText}】`,
          '',
          hookText !== title ? hookText : '',
          firstCaption,
          '',
          `${tagline}`,
          `🌸 ${brandName} - ${cta}`,
          link ? link : '',
          '',
          hashtags.slice(0, 8).join(' '),
        ].filter(Boolean).join('\n');
      } else if (platform === 'x') {
        // X has 280 char limit, keep it tight
        const body = [
          hookText,
          '',
          firstCaption,
          `→ ${tagline}`,
          '',
          `🌸${brandName}`,
          link ? `${link}` : '',
          '',
          hashtags.slice(0, 5).join(' '),
        ].filter(Boolean).join('\n');
        text = body.length > 280 ? body.slice(0, 277) + '…' : body;
      }

      document.getElementById('snsTextArea').value = text;
    }

    function copySnsText() {
      const textarea = document.getElementById('snsTextArea');
      const text = textarea.value;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('snsCopyBtn');
        btn.textContent = 'コピーしました！';
        btn.style.background = 'var(--accent)';
        btn.style.color = '#fff';
        btn.style.borderColor = 'var(--accent)';
        setTimeout(() => {
          btn.textContent = 'コピー';
          btn.style.background = '';
          btn.style.color = '';
          btn.style.borderColor = '';
        }, 2000);
      });
    }

    // ==================== Save / Load ====================
    function getSavedList() { return JSON.parse(localStorage.getItem('umeko_scenarios') || '{}'); }
    function saveScenario() {
      updateMeta();
      const name = scenario.title || 'untitled';
      const saved = getSavedList();
      saved[name] = JSON.parse(JSON.stringify(scenario));
      localStorage.setItem('umeko_scenarios', JSON.stringify(saved));
      renderSaved();
      alert(`「${name}」を保存しました`);
    }
    function loadScenario(name) {
      const saved = getSavedList();
      if (saved[name]) { scenario = JSON.parse(JSON.stringify(saved[name])); render(); resetPreview(); }
    }
    function deleteSaved(name, e) {
      e.stopPropagation();
      if (!confirm(`「${name}」を削除しますか？`)) return;
      const saved = getSavedList();
      delete saved[name];
      localStorage.setItem('umeko_scenarios', JSON.stringify(saved));
      renderSaved();
    }
    function renderSaved() {
      const el = document.getElementById('savedList');
      const saved = getSavedList();
      const keys = Object.keys(saved);
      if (keys.length === 0) {
        el.innerHTML = '<div style="font-size:13px;color:#aaa;padding:8px">保存済みシナリオはありません</div>';
        return;
      }
      el.innerHTML = keys.map(name => `
        <div class="saved-item" onclick="loadScenario('${name.replace(/'/g, "\\'")}')">
          <span>${name}</span>
          <div class="saved-item-actions">
            <button onclick="deleteSaved('${name.replace(/'/g, "\\'")}', event)">削除</button>
          </div>
        </div>
      `).join('');
    }

    // ==================== Export / Import ====================
    function exportJSON() {
      updateMeta();
      const blob = new Blob([JSON.stringify(scenario, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (scenario.title || 'scenario') + '.json';
      a.click();
      URL.revokeObjectURL(url);
    }
    function importJSON() { document.getElementById('importFile').click(); }
    function handleImport(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.scenes || !data.members) throw new Error('Invalid format');
          scenario = data;
          render();
          resetPreview();
          alert('インポートしました');
        } catch (err) { alert('JSONの読み込みに失敗しました: ' + err.message); }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    // ==================== Init ====================
    window.addEventListener('load', () => {
      render();
      generateSnsText('reels');
      const initFrame = () => sendToPreview('init', scenario);
      const frame = document.getElementById('previewFrame');
      if (frame.contentDocument?.readyState === 'complete') initFrame();
      else frame.addEventListener('load', initFrame);
    });
  </script>
</body>
